<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Queen B Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#333}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;display:inline-block}
input,textarea,select{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:#ccccff!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
a{color:inherit;text-decoration:none}
#app{display:flex;min-height:100vh}
#sidebar{width:260px;min-width:260px;background:#181824;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;transition:left .2s;overflow-y:auto}
#sidebar.closed{left:-260px}
.sb-head{padding:24px 22px 20px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:10}
.sb-logo{width:34px;height:34px;border-radius:8px;background:#ccccff;display:flex;align-items:center;justify-content:center}
.sb-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#555;padding:8px 12px 12px}
.sb-nav{padding:16px 12px;flex:1}
.sb-btn{display:flex;align-items:center;gap:12;width:100%;padding:11px 14px;margin-bottom:2px;border:none;border-radius:10px;background:transparent;color:#fff;cursor:pointer;font-size:13.5px;font-weight:500;font-family:inherit;text-align:left;transition:all .12s}
.sb-btn:hover{background:#1f1f30}
.sb-btn.active{background:#ccccff;color:#111;font-weight:700}
.sb-foot{padding:16px 22px;border-top:1px solid #2a2a3a;font-size:11px;color:#444}
#main-wrap{flex:1;margin-left:260px;transition:margin-left .2s;display:flex;flex-direction:column}
#main-wrap.full{margin-left:0}
#navbar{height:60px;background:#181824;display:flex;align-items:center;padding:0 24px;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid #2a2a3a}
.nav-left{display:flex;align-items:center;gap:16}
.nav-right{display:flex;align-items:center;gap:16}
.nav-title{font-size:15px;font-weight:600;color:#fff}
.nav-icon{background:none;border:none;color:#888;cursor:pointer;padding:4px;position:relative}
.nav-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:#ccccff}
.nav-sep{width:1px;height:28px;background:#2a2a3a}
.nav-user{display:flex;align-items:center;gap:10}
.nav-name{font-size:14px;font-weight:600;color:#fff}
.avatar{width:36px;height:36px;border-radius:50%;background:#ccccff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#111}
#content{flex:1;padding:28px 32px;max-width:1100px}
.page-hdr{margin-bottom:24px}
.page-hdr h2{font-size:22px;font-weight:700;color:#333;margin:0}
.page-hdr p{margin:4px 0 0;color:#888;font-size:14px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:24px;margin-bottom:16px}
.stat{background:#f8f9fa;border:1px solid #e5e5e5;border-radius:12px;padding:20px 24px;flex:1;min-width:160px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;color:#333;line-height:1}
.stat-sub{font-size:12px;color:#888;margin-top:4px}
.stats-row{display:flex;gap:16;margin-bottom:24px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6;padding:10px 20px;background:#ccccff;color:#111;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.outline{background:transparent;color:#ccccff;border:1.5px solid #ccccff}
.btn.sm{padding:6px 14px;font-size:12px}
.btn.danger{background:#dc3545;color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.inp{width:100%;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#333;box-sizing:border-box}
.inp-row{display:flex;gap:10}
.progress-bar{height:6px;background:#f8f9fa;border-radius:6px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#ccccff;border-radius:6px;transition:width .3s}
.tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e5;margin-bottom:20px}
.tab-btn{padding:10px 20px;border:none;border-bottom:3px solid transparent;background:transparent;color:#888;font-weight:500;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.active{color:#333;font-weight:700;border-bottom-color:#ccccff}
.kanban-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.kanban-col{background:#f8f9fa;border:2px dashed #e5e5e5;border-radius:12px;padding:16px;min-height:320px;transition:all .15s}
.kanban-col.over{border-color:#ccccff;background:#ccccff08}
.kanban-col-hdr{display:flex;align-items:center;gap:8;margin-bottom:14px;padding:0 4px}
.kanban-dot{width:10px;height:10px;border-radius:50%}
.kanban-col-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#333}
.kanban-count{margin-left:auto;font-size:12px;color:#888;font-weight:600;background:#fff;border-radius:6px;padding:2px 8px}
.kanban-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:grab;transition:box-shadow .15s}
.kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kanban-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.kanban-card-title{font-weight:600;font-size:14px;color:#333;line-height:1.3;flex:1}
.kanban-card-del{background:none;border:none;cursor:pointer;color:#888;padding:0;margin-left:8px;font-size:16px}
.kanban-card-meta{display:flex;align-items:center;gap:8;margin-top:10px}
.empty-col{text-align:center;color:#888;font-size:13px;padding:48px 0;opacity:.5}
.code-out{background:#1e1e2e;border-radius:10px;padding:20px;overflow-x:auto;margin-top:14px}
.code-out pre{margin:0;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;line-height:1.7;color:#D4D4D4;white-space:pre-wrap;word-break:break-word}
.result-item{display:flex;align-items:flex-start;gap:12;padding:12px 16px;border-radius:8px;border:1px solid #e5e5e5;margin-bottom:8px}
.result-item.fail{background:#dc354508;border-color:#dc354520}
.result-item.warn{background:#f0ad4e08;border-color:#f0ad4e20}
.result-url{font-size:13px;font-weight:600;color:#333;word-break:break-all}
.result-snippet{font-size:12px;font-family:monospace;background:#dc354510;padding:6px 10px;border-radius:4px;margin-top:4px;color:#dc3545;line-height:1.5}
.qa-page{padding:20px;border-left:4px solid #ccccff;margin-bottom:12px}
.qa-page.has-fail{border-left-color:#dc3545}
.qa-page.has-warn{border-left-color:#f0ad4e}
.qa-check{display:flex;align-items:center;gap:10;font-size:13px;color:#333;padding:6px 10px;background:#f8f9fa;border-radius:6px;margin-bottom:4px}
.qa-check-label{font-weight:600;min-width:90px}
.issue-row{display:flex;align-items:flex-start;gap:10;font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:4px;border:1px solid #dc354515;background:#dc354508}
.issue-row.warn-issue{border-color:#f0ad4e20;background:#f0ad4e10}
.cal-event{display:flex;align-items:stretch;border-radius:10px;padding:14px 18px;transition:box-shadow .12s;cursor:default;margin-bottom:10px}
.cal-event:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cal-time{min-width:100px;margin-right:20px}
.cal-time-main{font-size:14px;font-weight:600;color:#333}
.cal-time-dur{font-size:12px;color:#888;margin-top:2px}
.cal-details{flex:1}
.cal-summary{font-size:15px;font-weight:600;color:#333;margin-bottom:6px}
.cal-meta{display:flex;flex-wrap:wrap;gap:14;font-size:12px;color:#888}
.cal-join{display:inline-flex;align-items:center;gap:6;font-size:12px;font-weight:600;color:#333;padding:7px 14px;border:1.5px solid #e5e5e5;border-radius:8px;background:#fff;white-space:nowrap;transition:border-color .12s;text-decoration:none}
.cal-join:hover{border-color:#ccccff}
.day-label{display:flex;align-items:center;gap:10;margin-bottom:12px}
.day-name{font-size:14px;font-weight:700;color:#333}
.upload-box{border:2px dashed #e5e5e5;border-radius:12px;text-align:center;cursor:pointer;background:#f8f9fa;overflow:hidden;min-height:180px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.upload-box:hover{border-color:#ccccff}
.upload-box img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.apikey-bar{display:flex;align-items:center;gap:12;padding:14px 20px;background:#f8f9fa;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:20px}
.apikey-bar input{border:none;background:transparent;flex:1;padding:6px 0;font-size:13px;font-family:inherit;color:#333}
.apikey-bar input:focus{outline:none}
.add-link{background:none;border:none;color:#ccccff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;padding:4px 0}
.remove-btn{background:none;border:none;cursor:pointer;color:#888;padding:4px;font-size:16px}
</style>
</head>

<div id="app">
<!-- Sidebar -->
<nav id="sidebar">

<script>
/* ═══════ CONSTANTS ═══════ */
const NAV_ITEMS=[

const CAL_EVENTS=[
  {id:'1',summary:'AHM daily Meeting',start:'2026-06-20T17:00:00+08:00',end:'2026-06-20T17:30:00+08:00',location:'Philippines',meetUrl:'https://meet.google.com/qxt-kuij-nuw',organizer:'shinna',attendees:16},

/* ═══════ UTILITIES ═══════ */
function icon(svg,sz=18,col='currentColor'){return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svg}</svg>`}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function badge(text,bg,col='#fff'){return `<span class="badge" style="background:${bg};color:${col}">${text}</span>`}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
function dur(s,e){const m=(new Date(e)-new Date(s))/60000;return m<60?m+'m':Math.floor(m/60)+'h'+(m%60?' '+m%60+'m':'')}
function isToday(iso){return new Date(iso).toDateString()===new Date().toDateString()}
function isTmrw(iso){const t=new Date();t.setDate(t.getDate()+1);return new Date(iso).toDateString()===t.toDateString()}
function daysLeft(d){if(!d)return'';const diff=Math.ceil((new Date(d)-new Date())/864e5);return diff<0?'<span style="color:#dc3545;font-weight:700">Overdue</span>':diff===0?'Today':diff+'d'}
function saveApiKey(v){S.apiKey=v;try{localStorage.setItem('dashboard_api_key',v)}catch{}}
function textOf(html){return html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}
function hl(src){return src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$)/gm,'<span style="color:#6A9955">$1</span>').replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|from|def|async|await|try|catch|throw|new|this|self|print|lambda|True|False|None|require|module|echo|public|private|static)\b/g,'<span style="color:#569CD6">$1</span>').replace(/("(?:[^"\\]|\\.)*"|\'(?:[^\'\\]|\\.)*\'|`(?:[^`\\]|\\.)*`)/g,'<span style="color:#CE9178">$1</span>').replace(/\b(\d+\.?\d*)\b/g,'<span style="color:#B5CEA8">$1</span>')}
function fetchTimeout(url,ms=20000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t))}
async function proxyFetch(u){
  /* Use Netlify server-side proxy via _redirects — no CORS, no bot blocking */
  try{
    const clean=u.replace(/^https?:\/\//,'');
    const r=await fetchTimeout('/proxy/'+clean);
    const html=await r.text();
    if(html&&html.length>100&&!html.includes('Page Not Found'))return{ok:true,html,status:r.status};
  }catch(e){console.log('Netlify proxy failed:',e.message)}
  /* Fallback: public CORS proxies */
  const proxies=[
    p=>'https://corsproxy.io/?'+encodeURIComponent(p),
    p=>'https://api.allorigins.win/raw?url='+encodeURIComponent(p),
  ];
  for(const fn of proxies){try{const r=await fetchTimeout(fn(u),12000);if(r.ok){const html=await r.text();if(html&&html.length>100)return{ok:true,html,status:200}}}catch{}}
  return{ok:false,html:'',status:0};
}
function findLinks(html,base){const b=new URL(base);const s=new Set();const re=/href=["']([^"'#]+)["']/gi;let m;while((m=re.exec(html))!==null){try{const u=new URL(m[1],base);if(u.hostname===b.hostname&&!/\.(jpg|jpeg|png|gif|svg|pdf|zip|css|js|ico|woff2?|ttf|eot|mp[34]|webp)$/i.test(u.pathname))s.add(u.origin+u.pathname)}catch{}}return[...s].slice(0,30)}

async function scanLorem(){
  const urlEl=document.getElementById('lorem-url');if(!urlEl||!urlEl.value.trim())return;
  S.loremScanning=true;S.loremResults=[];renderPage();
  let target=urlEl.value.trim();if(!target.startsWith('http'))target='https://'+target;
  const LOREM_RE=/lorem\s+ipsum|dolor\s+sit\s+amet|consectetur\s+adipiscing|sed\s+do\s+eiusmod|ut\s+labore\s+et\s+dolore|quis\s+nostrud\s+exercitation/gi;
  S.loremProgress={c:0,t:1,s:'Fetching '+target};renderPage();
  const main=await proxyFetch(target);
  if(!main.ok){S.loremResults=[{url:target,status:'error',snippet:'Failed to load'}];S.loremScanning=false;renderPage();return}
  const pages=[target,...findLinks(main.html,target).filter(l=>l!==target)];
  S.loremProgress={c:0,t:pages.length,s:'Found '+pages.length+' pages'};renderPage();
  for(let i=0;i<pages.length;i++){
    S.loremProgress={c:i+1,t:pages.length,s:pages[i].replace(/^https?:\/\//,'').slice(0,60)};document.getElementById('content').querySelector('.progress-fill')&&(document.getElementById('content').querySelector('.progress-fill').style.width=(i+1)/pages.length*100+'%');
    const page=i===0?main:await proxyFetch(pages[i]);
    if(!page.ok){S.loremResults.push({url:pages[i],status:'error',snippet:'Failed to load'});continue}
    const text=textOf(page.html);LOREM_RE.lastIndex=0;
    if(LOREM_RE.test(text)){LOREM_RE.lastIndex=0;const idx=text.toLowerCase().indexOf('lorem ipsum');S.loremResults.push({url:pages[i],status:'fail',snippet:text.slice(Math.max(0,idx),idx+120).trim()})}
    else S.loremResults.push({url:pages[i],status:'pass',snippet:null});
  }
  S.loremScanning=false;renderPage();
}

  const pages=main.ok?[target,...findLinks(main.html,target).filter(l=>l!==target)]:[target];
  S.qaProgress={c:0,t:pages.length,s:'Scanning '+pages.length+' pages'};renderPage();

    if(!page.ok){checks.push({label:'Page Status',status:'fail',detail:'Failed ('+(page.status||'error')+')'});}
    else{checks.push({label:'Page Status',status:'pass',detail:'OK ('+page.status+')'});
      const scripts=(page.html.match(/<script[\s\S]*?<\/script>/gi)||[]);const broken=(page.html.match(/src=["'][^"']*["']/gi)||[]).filter(x=>/undefined|null/.test(x)).length;
      checks.push(broken>0?{label:'Scripts',status:'warn',detail:broken+' broken src(s)'}:{label:'Scripts',status:'pass',detail:scripts.length+' script(s), OK'});
      const h1=(page.html.match(/<h1[\s>]/gi)||[]).length,h2=(page.html.match(/<h2[\s>]/gi)||[]).length,h3=(page.html.match(/<h3[\s>]/gi)||[]).length;
      checks.push(h1===1?{label:'H1 Tag',status:'pass',detail:'Exactly 1 H1'}:h1===0?{label:'H1 Tag',status:'fail',detail:'No H1 found'}:{label:'H1 Tag',status:'warn',detail:h1+' H1 tags (should be 1)'});
      checks.push(h2>0?{label:'H2 Tags',status:'pass',detail:h2+' H2 tag(s)'}:{label:'H2 Tags',status:'warn',detail:'No H2 tags'});
      checks.push(h3>0?{label:'H3 Tags',status:'pass',detail:h3+' H3 tag(s)'}:{label:'H3 Tags',status:'warn',detail:'No H3 tags'});
    }
    res.push({url:pages[i],checks});
  }
  S.qaResults=res;S.qaScanning=false;renderPage();
}
async function scanContent(){
  const doctor=document.getElementById('cq-doctor')?.value;const urlEl=document.getElementById('cq-url');
  if(!urlEl||!urlEl.value.trim()||!doctor?.trim()||!S.apiKey)return;
  const validClinics=S.clinicNames.filter(x=>x.trim()),validLocs=S.locations.filter(x=>x.trim());
  S.cqScanning=true;S.cqResults=[];S.cqSummary=null;renderPage();
  let target=urlEl.value.trim();if(!target.startsWith('http'))target='https://'+target;
  S.cqProgress={c:0,t:1,s:'Fetching '+target};renderPage();
  const main=await proxyFetch(target);
  if(!main.ok){S.cqResults=[{url:target,issues:[{type:'error',msg:'Failed to load'}]}];S.cqScanning=false;renderPage();return}
  const pages=[target,...findLinks(main.html,target).filter(l=>l!==target)];
  S.cqProgress={c:0,t:pages.length,s:'Found '+pages.length+' pages'};renderPage();
  let totalIssues=0;
  for(let i=0;i<pages.length;i++){
    S.cqProgress={c:i+1,t:pages.length,s:pages[i].replace(/^https?:\/\//,'').slice(0,60)};renderPage();
    const page=i===0?main:await proxyFetch(pages[i]);
    if(!page.ok){S.cqResults.push({url:pages[i],issues:[{type:'error',msg:'Failed to load'}]});totalIssues++;continue}
    const text=textOf(page.html).slice(0,4000);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:`You are a website content QA specialist. Analyze this page content and check for issues.\n\nCORRECT doctor/owner name: "${doctor}"\nVALID clinic names: ${validClinics.length?validClinics.map(n=>'"'+n+'"').join(', '):'(none specified)'}\nVALID locations: ${validLocs.length?validLocs.map(n=>'"'+n+'"').join(', '):'(none specified)'}\n\nPAGE URL: ${pages[i]}\nPAGE CONTENT (excerpt):\n${text}\n\nCheck for these issues and respond ONLY with a JSON array. Each issue: {"type":"...","msg":"..."}.\nTypes: wrong_doctor, wrong_clinic, wrong_location, missing_doctor, missing_location, irrelevant.\nIf the page is generic (privacy, terms, contact, sitemap), do NOT flag missing_doctor or missing_location.\nIf no issues, return []. ONLY the JSON array.`}]})});
      const d=await r.json();let issues=[];
      if(d.content){try{issues=JSON.parse(d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim())}catch{issues=[{type:'error',msg:'Could not parse AI response'}]}}
      if(d.error)issues=[{type:'error',msg:d.error.message||'API error'}];
      totalIssues+=issues.length;S.cqResults.push({url:pages[i],issues});
    }catch(e){S.cqResults.push({url:pages[i],issues:[{type:'error',msg:e.message}]});totalIssues++}
  }
  S.cqSummary={pages:pages.length,issues:totalIssues};S.cqScanning=false;renderPage();
}

/* ═══════ PAGE: DOCTOR PHOTO ═══════ */
function renderPhoto(){
  let h=`<div class="page-hdr"><h2>Doctor Blog Image Generator</h2><p>Upload a doctor's photo — get a Midjourney prompt matching their appearance</p></div>`;
  h+=apiKeyBar();
  h+=`<div class="card"><div style="display:grid;grid-template-columns:${S.photoPreview?'200px 1fr':'1fr'};gap:24px">`;
  h+=`<div class="field"><label>Doctor Photo</label><div class="upload-box" onclick="document.getElementById('photo-file').click()">${S.photoPreview?`<img src="${S.photoPreview}" alt="Doctor">`:`<div style="padding:32px">${icon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>',28,'#888')}<div style="font-size:13px;color:#888;font-weight:500;margin-top:8px">Click to upload</div></div>`}</div><input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)"></div>`;
  h+=`<div><div class="field"><label>Blog Title / Service</label><input class="inp" id="ph-title" placeholder='e.g. "Heart Health Tips"'></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="field"><label>Image Style</label><select class="inp" id="ph-style"><option>Photorealistic</option><option>Editorial</option><option>Illustrated</option><option>Cinematic</option></select></div><div class="field"><label>Extra Details (optional)</label><input class="inp" id="ph-extra" placeholder='e.g. "outdoor setting"'></div></div><button class="btn" onclick="generatePhoto()" ${S.photoLoading||!S.photoPreview||!S.apiKey?'disabled':''}>${S.photoLoading?'Analyzing…':'✨ Generate Prompt'}</button>${!S.apiKey?'<span style="font-size:12px;color:#dc3545;margin-left:12px">API key required</span>':''}</div>`;
  h+=`</div></div>`;
  if(S.photoPrompt)h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14">${badge('Generated Prompt','#ccccff18','#ccccff')}<button class="btn sm outline" id="photo-prompt-copy" onclick="copyText('photo-prompt')">Copy</button></div><div id="photo-prompt" style="font-size:14px;line-height:1.7;background:#f8f9fa;border:1px solid #e5e5e5;border-radius:10px;padding:20px;white-space:pre-wrap">${esc(S.photoPrompt)}</div></div>`;
  return h;
}
function handlePhotoUpload(input){const file=input.files?.[0];if(!file)return;const r=new FileReader();r.onload=()=>{S.photoPreview=r.result;renderPage()};r.readAsDataURL(file)}
async function generatePhoto(){
  const title=document.getElementById('ph-title')?.value;const style=document.getElementById('ph-style')?.value;const extra=document.getElementById('ph-extra')?.value;
  if(!S.photoPreview||!title?.trim()||!S.apiKey)return;S.photoLoading=true;S.photoPrompt='';renderPage();
  try{const base64=S.photoPreview.split(',')[1];const mt=S.photoPreview.match(/data:([^;]+)/)?.[1]||'image/jpeg';
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:base64}},{type:'text',text:'You are an expert AI image prompt engineer. Analyze this photo of a doctor carefully. Describe their appearance in detail: approximate gender, age range, ethnicity, hair color/style, skin tone, facial features, build, and any distinctive characteristics.\n\nThen generate a single detailed Midjourney/Leonardo AI image prompt that:\n1. Describes this exact doctor\'s physical appearance\n2. Places them in a professional medical scene for: "'+title+'"\n3. Uses '+style+' style\n4. '+(extra?'Includes: '+extra:'Clean professional medical setting')+'\n5. Includes technical photography parameters\n\nReturn ONLY the prompt text. No explanation.'}]}]})});
    const d=await r.json();S.photoPrompt=d.error?'Error: '+(d.error.message||JSON.stringify(d.error)):d.content?.map(b=>b.text||'').join('\n')||'No response';
  }catch(e){S.photoPrompt='Error: '+e.message}S.photoLoading=false;renderPage();
}
/* ═══════ NAVIGATION & RENDERING ═══════ */
function navigate(page){
  S.page=page;
  document.getElementById('nav-page-title').textContent=NAV_ITEMS.find(n=>n.id===page)?.label||'';
  renderSidebarButtons();
  renderPage();
}
function renderSidebarButtons(){
  const el=document.getElementById('nav-buttons');if(!el)return;
  el.innerHTML=NAV_ITEMS.map(item=>`<button class="sb-btn ${S.page===item.id?'active':''}" onclick="navigate('${item.id}')">${icon(item.svg,18)} ${item.label}</button>`).join('');
}
function renderPage(){
  const el=document.getElementById('content');if(!el)return;
  switch(S.page){
    case 'calendar':el.innerHTML=renderCalendar();break;
    case 'projects':el.innerHTML=renderKanban();break;
    case 'codegen':el.innerHTML=renderCodeGen();break;
    case 'lorem':el.innerHTML=renderLorem();break;
    case 'qa':el.innerHTML=renderQA();break;
    case 'photo':el.innerHTML=renderPhoto();break;
  }
}
function toggleSidebar(){
  S.sidebarOpen=!S.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed',!S.sidebarOpen);
  document.getElementById('main-wrap').classList.toggle('full',!S.sidebarOpen);
  document.getElementById('menu-btn').style.display=S.sidebarOpen?'none':'block';
}

/* ═══════ INIT ═══════ */
document.addEventListener('DOMContentLoaded',()=>{
  renderSidebarButtons();
  renderPage();
});
</script>
